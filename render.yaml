services:
  - type: web
    name: auth-service
    env: docker
    dockerfilePath: ./plataforma/backend/services/auth-service/Dockerfile
    dockerContext: ./plataforma/backend/services/auth-service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TURSO_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: "3001"
      - key: NODE_ENV
        value: production

  - type: web
    name: academic-service
    env: docker
    dockerfilePath: ./plataforma/backend/services/academic-service/Dockerfile
    dockerContext: ./plataforma/backend/services/academic-service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TURSO_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: AUTH_SERVICE_URL
        sync: false
      - key: PORT
        value: "3002"
      - key: NODE_ENV
        value: production

  - type: web
    name: assignment-service
    env: docker
    dockerfilePath: ./plataforma/backend/services/assignment-service/Dockerfile
    dockerContext: ./plataforma/backend/services/assignment-service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TURSO_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: AUTH_SERVICE_URL
        sync: false
      - key: ACADEMIC_SERVICE_URL
        sync: false
      - key: PORT
        value: "3003"
      - key: NODE_ENV
        value: production

  - type: web
    name: frontend
    env: static
    buildCommand: cd plataforma/frontend && npm install && npm run build
    staticPublishPath: ./plataforma/frontend/dist
    buildFilter:
      paths:
        - plataforma/frontend/**
    envVars:
      - key: VITE_AUTH_URL
        sync: false
      - key: VITE_ACADEMIC_URL
        sync: false
      - key: VITE_ASSIGNMENT_URL
        sync: false
