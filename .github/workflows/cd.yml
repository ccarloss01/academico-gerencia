# cd.yml — Continuous Deployment pipeline
#
# Triggers: when the CI workflow completes on main with conclusion 'success'.
# Using workflow_run ensures CD only starts after CI passes — if CI fails,
# the if: condition blocks the version job and nothing deploys.
#
# Pipeline stages:
#   1. version    — bump semver tag from conventional commit messages
#   2. build-push — build Docker images and push to GitHub Container Registry (GHCR)
#   3. deploy     — trigger Render deploy hooks (one per service)
#   4. release    — create a GitHub Release with auto-generated changelog
#
# GHCR (ghcr.io) is used instead of Docker Hub because it's free for public
# repos and uses the same GITHUB_TOKEN for auth — no extra secret to manage.

name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# CD must NOT cancel in-progress runs (unlike CI). If two pushes land close
# together, the second should wait for the first deploy to finish rather than
# cancelling it mid-deploy, which could leave Render in a partially updated state.
concurrency:
  group: cd-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # IMAGE_PREFIX is evaluated at workflow run time, not at parse time.
  # github.repository_owner is the GitHub org/user name (e.g. "ccarloss01").
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  version:
    name: Versionamento automático
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      # contents: write is required for the tag action to push a new git tag.
      contents: write
    outputs:
      # new_tag and changelog are passed to downstream jobs via outputs.
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}

    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 fetches full git history so the tag action can
          # read ALL conventional commit messages since the last tag and
          # determine the correct semver bump (patch/minor/major).
          # Without this, a shallow clone (depth 1) would see no prior tags
          # and default to bumping patch on every push.
          fetch-depth: 0

      - name: Gerar tag semântica
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # default_bump: patch — if no conventional commit prefix is found
          # (feat:/fix:/BREAKING CHANGE:), increment patch version.
          default_bump: patch
          release_branches: main
          tag_prefix: v

  build-push:
    name: Build & push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: version
    strategy:
      matrix:
        service:
          - auth-service
          - academic-service
          - assignment-service
    permissions:
      contents: read
      # packages: write is required to push to GHCR (GitHub Packages).
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN has packages: write permission (declared above) and
          # is sufficient for GHCR — no PAT or additional secret needed.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          # Two tags per image:
          #   1. Semantic version tag (e.g. v1.4.2) — immutable, used for
          #      rollback ("deploy v1.4.1" if v1.4.2 breaks something).
          #   2. "latest" — mutable pointer to the most recent build; useful
          #      for quick checks but not recommended for production references.
          tags: |
            type=raw,value=${{ needs.version.outputs.new_tag }}
            type=raw,value=latest

      - name: Build cache (buildx)
        # docker/setup-buildx-action enables BuildKit features, including
        # layer caching. Without this, docker build would use the legacy
        # builder which doesn't support --cache-from type=gha.
        uses: docker/setup-buildx-action@v3

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: plataforma/backend/services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache: on a cache hit, only changed layers are rebuilt.
          # mode=max caches all layers (including intermediate build stages),
          # not just the final image — reduces rebuild time for large images.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy no Render
    runs-on: ubuntu-latest
    needs: [version, build-push]
    # environment: production gates this job behind GitHub's "required reviewers"
    # if configured in the repository settings. Without reviewers configured,
    # it acts as a label/namespace with no approval gate.
    environment: production

    steps:
      # Each service has its own Render deploy hook URL stored as a GitHub secret.
      # POSTing to the hook URL triggers Render to pull the latest image and
      # redeploy the service. Render handles health check verification post-deploy.
      #
      # The "if [ -z "$HOOK" ]" guard allows deploying a subset of services:
      # if RENDER_HOOK_AUTH is not configured (e.g. in a fork or staging env),
      # the step is skipped gracefully instead of failing the pipeline.
      # This is useful during initial setup before all hooks are registered.
      - name: Deploy auth-service
        env:
          HOOK: ${{ secrets.RENDER_HOOK_AUTH }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_HOOK_AUTH não configurado — pulando deploy"
          else
            curl -s --fail -X POST "$HOOK"
          fi

      - name: Deploy academic-service
        env:
          HOOK: ${{ secrets.RENDER_HOOK_ACADEMIC }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_HOOK_ACADEMIC não configurado — pulando deploy"
          else
            curl -s --fail -X POST "$HOOK"
          fi

      - name: Deploy assignment-service
        env:
          HOOK: ${{ secrets.RENDER_HOOK_ASSIGNMENT }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_HOOK_ASSIGNMENT não configurado — pulando deploy"
          else
            curl -s --fail -X POST "$HOOK"
          fi

      - name: Deploy frontend
        env:
          HOOK: ${{ secrets.RENDER_HOOK_FRONTEND }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_HOOK_FRONTEND não configurado — pulando deploy"
          else
            curl -s --fail -X POST "$HOOK"
          fi

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [version, deploy]
    permissions:
      contents: write

    steps:
      # Creates a GitHub Release with the semver tag and auto-generated
      # changelog from conventional commit messages (feat:, fix:, etc.).
      # The changelog is produced by the version job and passed via outputs.
      # This gives a visible audit trail of what changed in each release,
      # linked from the repository's Releases page.
      - name: Criar release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.new_tag }}
          name: Release ${{ needs.version.outputs.new_tag }}
          body: ${{ needs.version.outputs.changelog }}
          token: ${{ secrets.GITHUB_TOKEN }}
