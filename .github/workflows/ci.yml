name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + teste + auditoria de segurança ──────────────────────
  backend:
    name: "${{ matrix.service }} — lint / test / audit"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - academic-service
          - assignment-service
    defaults:
      run:
        working-directory: plataforma/backend/services/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plataforma/backend/services/${{ matrix.service }}/package.json

      - name: Instalar dependências
        run: npm install

      - name: Lint (ESLint)
        run: npm run lint

      - name: Testes unitários (Jest)
        run: npm test

      - name: Auditoria de segurança (npm audit)
        # --audit-level=high ignora low/moderate; ajuste conforme política
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: false

      - name: Relatório de cobertura (opcional)
        run: npm test -- --coverage --coverageReporters=text-summary
        continue-on-error: true

  # ── Frontend: build + lint ───────────────────────────────────────────────
  frontend:
    name: "frontend — build / lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plataforma/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plataforma/frontend/package.json

      - name: Instalar dependências
        run: npm install

      - name: Build de produção
        run: npm run build
        env:
          VITE_AUTH_URL: http://localhost:3001
          VITE_ACADEMIC_URL: http://localhost:3002
          VITE_ASSIGNMENT_URL: http://localhost:3003

  # ── Gate final: garante que CI passou antes do merge ────────────────────
  ci-ok:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - name: Verificar resultado
        run: |
          if [[ "${{ needs.backend.result }}" != "success" || "${{ needs.frontend.result }}" != "success" ]]; then
            echo "❌ CI falhou"
            exit 1
          fi
          echo "✅ CI passou"
