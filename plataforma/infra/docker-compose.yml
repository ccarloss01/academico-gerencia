services:
  auth-service:
    build: ../backend/services/auth-service
    ports:
      - "3001:3001"
    environment:
      TURSO_URL: file:/data/auth.db
      JWT_SECRET: dev-jwt-secret-troque-em-producao
      PORT: 3001
    volumes:
      - auth-data:/data

  academic-service:
    build: ../backend/services/academic-service
    ports:
      - "3002:3002"
    environment:
      TURSO_URL: file:/data/academic.db
      AUTH_SERVICE_URL: http://auth-service:3001
      PORT: 3002
    volumes:
      - academic-data:/data
    depends_on:
      - auth-service

  assignment-service:
    build: ../backend/services/assignment-service
    ports:
      - "3003:3003"
    environment:
      TURSO_URL: file:/data/assignment.db
      AUTH_SERVICE_URL: http://auth-service:3001
      ACADEMIC_SERVICE_URL: http://academic-service:3002
      PORT: 3003
    volumes:
      - assignment-data:/data
    depends_on:
      - auth-service
      - academic-service

  frontend:
    build:
      context: ../frontend
      args:
        VITE_AUTH_URL: http://localhost:3001
        VITE_ACADEMIC_URL: http://localhost:3002
        VITE_ASSIGNMENT_URL: http://localhost:3003
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - academic-service
      - assignment-service

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    depends_on:
      - auth-service
      - academic-service
      - assignment-service

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  auth-data:
  academic-data:
  assignment-data:
  promdata:
  grafanadata:
