name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  auth-service:
    name: auth-service — lint, test, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/services/auth-service/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm audit --audit-level=high

  academic-service:
    name: academic-service — lint, test, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/academic-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/services/academic-service/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm audit --audit-level=high

  assignment-service:
    name: assignment-service — lint, test, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/assignment-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/services/assignment-service/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm audit --audit-level=high

  frontend:
    name: frontend — lint, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          VITE_AUTH_URL: http://localhost:3001
          VITE_ACADEMIC_URL: http://localhost:3002
          VITE_ASSIGNMENT_URL: http://localhost:3003
