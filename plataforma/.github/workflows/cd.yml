name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy no Render
    runs-on: ubuntu-latest
    steps:
      - name: Deploy auth-service
        run: curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_AUTH }}"

      - name: Deploy academic-service
        run: curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_ACADEMIC }}"

      - name: Deploy assignment-service
        run: curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_ASSIGNMENT }}"

      - name: Deploy frontend
        run: curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
